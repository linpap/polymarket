name: Polymarket Trading Bot

on:
  schedule:
    # 23:15 UTC = 6:15 PM EST (15 min before market opens)
    - cron: '15 23 * * *'
  workflow_dispatch: {}

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      # Restore state from previous run
      - uses: actions/cache@v4
        with:
          path: state/trades.json
          key: bot-state-${{ github.run_number }}
          restore-keys: bot-state-

      - run: mkdir -p state

      # Create .env from secrets
      - run: |
          echo "NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "DRY_RUN=true" >> .env
          echo "LOG_LEVEL=info" >> .env

      # Run bot for 4.5 hours, then graceful shutdown
      - run: timeout --signal=SIGTERM 16200 npx tsx src/index.ts || true

      # Upload state as artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-state-${{ github.run_id }}
          path: state/trades.json
